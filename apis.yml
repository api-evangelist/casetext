aid: casetext
name: Casetext
description: >-
  Casetext is a legal technology company founded in 2013 by Jake Heller, Joanna
  Huey, and Laurence Pfeffer and headquartered in San Francisco, California.
  The company built one of the earliest neural-search engines for U.S. case
  law (Parallel Search) and a broader research platform covering federal and
  state cases, statutes, regulations, and secondary sources, with citator
  signals delivered through its SmartCite feature. Casetext is best known for
  CoCounsel, a generative-AI legal assistant released in March 2023 and
  originally built on top of OpenAI's GPT-4, that automates document review,
  deposition preparation, contract analysis, legal research memos, and
  database queries for law firms and in-house legal teams. Companion products
  include AllSearch, a private document search tool that lets firms run
  Parallel Search across their own document collections, and Compose, an
  automated brief-drafting product. Thomson Reuters acquired Casetext in
  June 2023 for $650 million in an all-cash deal that closed in August 2023,
  and CoCounsel has since been integrated across Thomson Reuters' Westlaw,
  Practical Law, and HighQ product lines as the company's flagship legal-AI
  assistant. The Casetext platform is sold as a SaaS subscription to law
  firms, corporate legal departments, and government agencies; there is no
  public developer API, SDK, or open-source release, and the casetext GitHub
  organization contains only archived research forks (transformers, ELECTRA,
  pgvector, FiD) plus a handful of internal infrastructure repos that were
  archived after the Thomson Reuters acquisition.
